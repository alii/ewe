name = "ewe"
version = "0.5.0"

description = "[WIP] 🐑 a fluffy Gleam web server"
target = "erlang"
licences = ["Apache-2.0"]
repository = { type = "github", user = "vshakitskiy", repo = "ewe" }
links = [
  { title = "Gleam", href = "https://gleam.run" },
  { title = "Mist", href = "https://github.com/rawhat/mist" }
]

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
glisten = ">= 8.0.1 and < 9.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
gleam_otp = ">= 1.1.0 and < 2.0.0"
gleam_http = ">= 4.1.1 and < 5.0.0"
gramps = ">= 6.0.0 and < 7.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
gleam_json = ">= 3.0.2 and < 4.0.0"
